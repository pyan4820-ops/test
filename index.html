          desc: "你拥有极其充沛的生命能量。遇到感兴趣的事，你的燃点极低，会毫不保留投入全部热情。你敢爱敢恨，宁愿热烈地燃烧自我，也不愿平庸地生锈，是极致的理想主义体验派。" },
        { name: "入世现实家", formula: "NaCl 氯化钠", profile: { density: 80, compatibility: 70, stability: 70, volatility: 10, activity: 40, corrosivity: 30 },
          desc: "食盐是生存必需品，正如你。你不追求虚无的幻想，而是脚踏实地解决眼前问题。你既有原则底线，又能极好地适应社会规则。你是最通透的世俗大智者，靠谱且不可或缺。" },
        { name: "体验狂徒", formula: "多巴胺", profile: { activity: 90, volatility: 90, corrosivity: 70, stability: 30, density: 30, compatibility: 60 },
          desc: "本质上你代表生命的驱动力。你拒绝一成不变，热衷新鲜感、跳出舒适圈。你敢于打破常规，对世界保持旺盛欲望。你的存在本身就是对无聊世界的最大反叛，永远在追逐下一个快乐巅峰。" }
    ];

    function renderQuestion() {
        const qData = questions[currentQuestionIndex];
        document.getElementById('progress').innerText = `当前进度：${currentQuestionIndex + 1} / 20`;
        document.getElementById('question-text').innerText = qData.q;
        
        const optsArea = document.getElementById('options-area');
        optsArea.innerHTML = ''; // 清空上一题选项
        
        qData.opts.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt.t;
            btn.onclick = () => selectOption(opt.s);
            optsArea.appendChild(btn);
        });
    }

    function selectOption(scoreDelta) {
        // 累加得分
        for (let key in scoreDelta) {
            scores[key] += scoreDelta[key];
        }
        
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            renderQuestion();
        } else {
            calculateAndShowResult();
        }
    }

    function calculateAndShowResult() {
        // 1. 将原始得分(大概在 -20 到 +30 之间)归一化到 0-100 用于雷达图显示
        let normalizedScores = {};
        let finalRadarData = [];
        const keys = ['activity', 'stability', 'compatibility', 'volatility', 'corrosivity', 'density'];
        
        keys.forEach(key => {
            // 简单的数学映射：假设最低-15，最高35，映射到10-95的区间让图表好看
            let val = ((scores[key] + 15) / 50) * 100;
            val = Math.max(10, Math.min(100, val)); // 限制在 10-100 之间
            normalizedScores[key] = val;
            finalRadarData.push(val);
        });

        // 2. 匹配最近的化合物人格（计算欧几里得距离）
        let bestMatch = resultArchetypes[0];
        let minDistance = Infinity;

        resultArchetypes.forEach(archetype => {
            let distance = 0;
            keys.forEach(key => {
                distance += Math.pow(normalizedScores[key] - archetype.profile[key], 2);
            });
            if (distance < minDistance) {
                minDistance = distance;
                bestMatch = archetype;
            }
        });

        // 3. 切换界面显示结果
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        document.getElementById('result-formula').innerHTML = bestMatch.formula;
        document.getElementById('result-title').innerText = bestMatch.name;
        document.getElementById('result-desc').innerText = bestMatch.desc;

        // 4. 绘制清新蓝色雷达图
        const ctx = document.getElementById('radarChart').getContext('2d');
        radarChartObj = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['活跃探索', '情绪稳定', '共情相容', '随性挥发', '锋芒批判', '靠谱深度'],
                datasets: [{
                    label: '你的化学维系',
                    data: finalRadarData,
                    backgroundColor: 'rgba(14, 165, 233, 0.25)', // 半透明主色
                    borderColor: '#0ea5e9',
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#0ea5e9',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: '#0ea5e9',
                    borderWidth: 2,
                    pointRadius: 4
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: 'rgba(100, 116, 139, 0.2)' },
                        grid: { color: 'rgba(100, 116, 139, 0.2)' },
                        pointLabels: { color: '#0f172a', font: { size: 13, family: 'sans-serif', weight: 'bold' } },
                        ticks: { display: false, max: 100, min: 0 } // 隐藏刻度数字
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // 初始化第一题
    renderQuestion();
</script>
